<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер ХЗ</title>
    <!-- Подключаем всё необходимое -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; height: 100vh; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .msg-own { align-self: flex-end; background: linear-gradient(to tr, #4338ca, #6366f1); border-radius: 18px 18px 0 18px; }
        .msg-other { align-self: flex-start; background: rgba(255, 255, 255, 0.08); border-radius: 18px 18px 18px 0; }
        #chat-window::-webkit-scrollbar { width: 4px; }
        #chat-window::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .rec-pulse { animation: pulse 1s infinite; color: #ef4444; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex items-center justify-center p-0 sm:p-4">

    <!-- ФОРМА ВХОДА И РЕГИСТРАЦИИ -->
    <div id="auth-section" class="w-full max-w-md p-8 glass rounded-3xl shadow-2xl mx-4">
        <div class="text-center mb-8">
            <div class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-700 flex items-center justify-center text-4xl font-black shadow-xl shadow-blue-900/40">ХЗ</div>
            <h2 id="auth-title" class="text-2xl font-extrabold italic tracking-tighter">Вход в систему</h2>
            <p id="auth-subtitle" class="text-gray-500 text-[10px] uppercase tracking-[0.2em] font-bold mt-2 text-blue-400">Secure Messenger</p>
        </div>

        <div class="space-y-4">
            <input type="email" id="auth-email" placeholder="Email" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition text-sm">
            <input type="password" id="auth-password" placeholder="Пароль" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition text-sm">
            <button id="auth-btn" class="w-full bg-blue-600 hover:bg-blue-500 py-3.5 rounded-xl font-bold transition shadow-lg shadow-blue-600/20">Войти</button>
        </div>

        <button id="auth-toggle-btn" class="w-full text-center mt-6 text-xs text-gray-500 hover:text-blue-400 transition font-bold uppercase tracking-wider italic">
            Создать новый аккаунт
        </button>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС ЧАТА -->
    <div id="chat-section" class="hidden w-full max-w-5xl h-screen sm:h-[90vh] glass sm:rounded-3xl shadow-2xl flex flex-col overflow-hidden relative">
        <!-- Шапка -->
        <header class="px-6 py-4 border-b border-white/5 bg-white/5 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 flex items-center justify-center font-black italic">ХЗ</div>
                <div>
                    <h1 id="user-display" class="text-sm font-bold text-blue-100">Загрузка...</h1>
                    <button onclick="handleLogout()" class="text-[9px] text-red-500 font-black uppercase tracking-widest hover:opacity-70 transition">Выйти из аккаунта</button>
                </div>
            </div>
            <div class="text-[9px] font-black text-gray-500 uppercase tracking-[0.3em] bg-white/5 px-4 py-1.5 rounded-full border border-white/10">
                3 Day Ghost Mode
            </div>
        </header>

        <!-- Окно сообщений -->
        <div id="chat-window" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-4 flex flex-col bg-slate-900/40">
            <!-- Сообщения появятся здесь -->
        </div>

        <!-- Предпросмотр файлов перед отправкой -->
        <div id="preview-area" class="hidden px-6 py-3 bg-blue-600/20 flex justify-between items-center border-t border-blue-500/30">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-file-export text-blue-400"></i>
                <span id="file-name" class="text-[10px] italic truncate max-w-xs">Файл готов...</span>
            </div>
            <button onclick="clearFile()" class="text-red-400 text-xs font-black">ОТМЕНА</button>
        </div>

        <!-- Панель ввода -->
        <div class="p-4 sm:p-6 bg-white/5 border-t border-white/10">
            <div class="flex items-center gap-3 sm:gap-5 max-w-4xl mx-auto">
                <label class="cursor-pointer text-gray-400 hover:text-white transition">
                    <i class="fa-solid fa-circle-plus text-2xl"></i>
                    <input type="file" id="fileInput" class="hidden" onchange="handleFileSelect()">
                </label>
                
                <button id="micBtn" class="text-gray-400 hover:text-red-500 transition">
                    <i class="fa-solid fa-microphone text-xl" id="micIcon"></i>
                </button>

                <input type="text" id="msgInput" placeholder="Введите сообщение..." 
                    class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-6 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/40 transition">
                
                <button onclick="send()" class="w-14 h-14 bg-blue-600 hover:bg-blue-500 rounded-2xl transition shadow-xl shadow-blue-600/30 flex items-center justify-center group">
                    <i class="fa-solid fa-paper-plane text-xl group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- ПАРАМЕТРЫ SUPABASE ---
        const SB_URL = "https://diijudzypthmfdlhhglr.supabase.co";
        const SB_KEY = "sb_publishable_cxF0MUM3Gn7Lc_Bi1PIAag_bwyhwANF";
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        // Элементы
        const authSection = document.getElementById('auth-section');
        const chatSection = document.getElementById('chat-section');
        const chatWindow = document.getElementById('chat-window');
        const msgInput = document.getElementById('msgInput');
        const micBtn = document.getElementById('micBtn');
        const micIcon = document.getElementById('micIcon');
        
        let currentUser = null;
        let isLoginMode = true;
        let selectedFile = null;
        let mediaRecorder;
        let audioChunks = [];

        // --- АВТОРИЗАЦИЯ ---
        document.getElementById('auth-toggle-btn').onclick = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Вход в систему" : "Регистрация";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Войти" : "Создать аккаунт";
            document.getElementById('auth-toggle-btn').innerText = isLoginMode ? "Создать новый аккаунт" : "Уже есть аккаунт? Войти";
        };

        document.getElementById('auth-btn').onclick = async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if (!email || !password) return alert("Заполни данные!");

            if (isLoginMode) {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) alert("Ошибка: " + error.message);
            } else {
                const { error } = await supabase.auth.signUp({ email, password });
                if (error) alert("Ошибка: " + error.message);
                else alert("Регистрация успешна! Теперь нажми Войти.");
            }
        };

        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                currentUser = session.user;
                authSection.classList.add('hidden');
                chatSection.classList.remove('hidden');
                document.getElementById('user-display').innerText = currentUser.email;
                loadMessages();
            } else {
                authSection.classList.remove('hidden');
                chatSection.classList.add('hidden');
            }
        });

        async function handleLogout() { await supabase.auth.signOut(); }

        // --- ЛОГИКА ЧАТА ---
        async function loadMessages() {
            // Фильтр: только сообщения за последние 3 дня
            const threeDaysAgo = new Date(Date.now() - 3 * 24 * 60 * 60 * 1000).toISOString();
            
            const { data, error } = await supabase
                .from('messagesmessages')
                .select('*')
                .gt('created_at', threeDaysAgo)
                .order('created_at', { ascending: true });
            
            chatWindow.innerHTML = '';
            if (data) data.forEach(renderMessage);
            scrollToBottom();
        }

        function renderMessage(msg) {
            const div = document.createElement('div');
            const isMine = currentUser && msg.author === currentUser.email;
            div.className = `flex flex-col mb-1 ${isMine ? 'items-end' : 'items-start'}`;
            
            let content = '';
            if (msg.type === 'text') content = `<p class="whitespace-pre-wrap break-words leading-relaxed">${msg.text}</p>`;
            else if (msg.type === 'image') content = `<img src="${msg.file_url}" class="rounded-xl max-h-80 shadow-lg cursor-pointer transition active:scale-95" onclick="window.open('${msg.file_url}')">${msg.text ? `<p class="mt-2 text-xs">${msg.text}</p>` : ''}`;
            else if (msg.type === 'audio') content = `<audio controls class="h-8 w-44 brightness-125"><source src="${msg.file_url}"></audio>`;
            else content = `<a href="${msg.file_url}" target="_blank" class="flex items-center gap-2 text-blue-300 hover:text-white transition italic underline decoration-blue-500/50">Прикрепленный файл <i class="fa-solid fa-download text-[10px]"></i></a>`;

            const time = new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const nick = msg.author.split('@')[0];

            div.innerHTML = `
                <span class="text-[8px] text-gray-500 mb-1 px-3 font-black uppercase tracking-tighter">${isMine ? 'Вы' : nick}</span>
                <div class="px-5 py-3 shadow-xl ${isMine ? 'msg-own' : 'msg-other'}">
                    ${content}
                    <span class="text-[7px] opacity-30 block text-right mt-1.5 font-mono">${time}</span>
                </div>
            `;
            chatWindow.appendChild(div);
            scrollToBottom();
        }

        // --- ОТПРАВКА ---
        async function send() {
            const text = msgInput.value.trim();
            if (!text && !selectedFile) return;

            let fileUrl = null;
            let type = 'text';

            if (selectedFile) {
                const fileName = `${Date.now()}_${selectedFile.name}`;
                const { data, error } = await supabase.storage.from('uploads').upload(fileName, selectedFile);
                if (data) {
                    const { data: urlData } = supabase.storage.from('uploads').getPublicUrl(fileName);
                    fileUrl = urlData.publicUrl;
                    type = selectedFile.type.startsWith('image') ? 'image' : 'file';
                }
            }

            const { error } = await supabase.from('messagesmessages').insert([{ text, file_url: fileUrl, type, author: currentUser.email }]);
            if (error) alert("Ошибка базы: " + error.message);
            
            msgInput.value = '';
            clearFile();
        }

        // --- ГОЛОСОВЫЕ ---
        micBtn.onclick = async () => {
            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const fileName = `voice_${Date.now()}.webm`;
                        const { data } = await supabase.storage.from('uploads').upload(fileName, audioBlob);
                        if (data) {
                            const { data: uData } = supabase.storage.from('uploads').getPublicUrl(fileName);
                            await supabase.from('messagesmessages').insert([{ file_url: uData.publicUrl, type: 'audio', author: currentUser.email }]);
                        }
                    };
                    mediaRecorder.start();
                    micIcon.classList.add('rec-pulse', 'fa-circle-dot');
                    micIcon.classList.remove('fa-microphone');
                } catch (e) { alert("Дай доступ к микрофону!"); }
            } else {
                mediaRecorder.stop();
                micIcon.classList.remove('rec-pulse', 'fa-circle-dot');
                micIcon.classList.add('fa-microphone');
            }
        };

        // --- ПРОЧЕЕ ---
        function handleFileSelect() {
            selectedFile = document.getElementById('fileInput').files[0];
            if (selectedFile) {
                document.getElementById('preview-area').classList.remove('hidden');
                document.getElementById('file-name').innerText = "К отправке: " + selectedFile.name;
            }
        }
        function clearFile() { selectedFile = null; document.getElementById('preview-area').classList.add('hidden'); }
        function scrollToBottom() { chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' }); }
        
        // Подписка Realtime
        supabase.channel('public:messagesmessages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messagesmessages' }, p => renderMessage(p.new)).subscribe();
        msgInput.onkeypress = e => { if (e.key === 'Enter') send(); };
    </script>
</body>
</html>
