<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X3 Messenger | Pixel Battle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #020617; --card: rgba(255,255,255,0.03); --primary: #2563eb; }
        .theme-midnight { --bg: #000000; --primary: #1e1e1e; }
        .theme-neon { --bg: #0f172a; --primary: #f472b6; }

        body { background: var(--bg); color: white; font-family: sans-serif; height: 100vh; margin: 0; overflow: hidden; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass { background: var(--card); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* Анимации */
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .tab-content { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden { display: none !important; opacity: 0; }

        .msg-own { align-self: flex-end; background: var(--primary); border-radius: 18px 18px 0 18px; transition: 0.2s; }
        .msg-other { align-self: flex-start; background: rgba(255,255,255,0.08); border-radius: 18px 18px 18px 0; }

        .nav-btn { opacity: 0.3; cursor: pointer; padding: 12px; transition: 0.3s; }
        .nav-btn.active { opacity: 1; color: var(--primary); transform: scale(1.2); }

        #main-ui { width: 100%; max-width: 1100px; height: 95vh; display: grid; grid-template-columns: 80px 1fr; }
        
        /* Pixel Battle */
        #pixel-canvas { image-rendering: pixelated; cursor: crosshair; background: white; }
        .canvas-container { overflow: auto; border: 2px solid rgba(255,255,255,0.1); border-radius: 20px; position: relative; }
    </style>
</head>
<body class="flex items-center justify-center p-0 sm:p-2">

    <!-- ВХОД -->
    <div id="auth-ui" class="glass p-12 rounded-[3rem] text-center w-full max-w-sm mx-4 shadow-2xl fade-in">
        <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center text-4xl font-black italic mx-auto mb-8 shadow-blue-500/20 shadow-2xl text-white">X3</div>
        <button onclick="login()" class="w-full bg-white text-black py-4 rounded-2xl font-bold flex items-center justify-center gap-3 hover:scale-105 transition-all">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Google Login
        </button>
    </div>

    <!-- ИНТЕРФЕЙС -->
    <div id="main-ui" class="hidden glass sm:rounded-[3rem] overflow-hidden shadow-2xl fade-in">
        
        <!-- SIDEBAR -->
        <div class="bg-black/40 flex flex-col items-center py-8 border-r border-white/5">
            <img id="my-avatar" class="w-12 h-12 rounded-2xl mb-10 border-2 border-blue-500 shadow-xl cursor-pointer hover:scale-110 transition" onclick="switchTab('settings')" src="">
            <div class="flex flex-col gap-8 flex-1 text-2xl text-white">
                <i onclick="switchTab('chat')" id="tab-chat" class="fa-solid fa-message nav-btn active"></i>
                <i onclick="switchTab('friends')" id="tab-friends" class="fa-solid fa-user-plus nav-btn"></i>
                <i onclick="switchTab('pixel')" id="tab-pixel" class="fa-solid fa-palette nav-btn"></i>
                <i onclick="switchTab('settings')" id="tab-settings" class="fa-solid fa-gear nav-btn"></i>
            </div>
            <button onclick="logout()" class="text-red-500 p-4 opacity-50 hover:opacity-100 transition"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <div class="flex flex-1 overflow-hidden">
            
            <!-- ВКЛАДКА ЧАТЫ -->
            <div id="chat-sidebar-ui" class="flex flex-row flex-1 overflow-hidden">
                <div class="w-72 bg-black/20 border-r border-white/5 overflow-y-auto">
                    <div class="p-6 text-[10px] font-black uppercase text-blue-500 tracking-[0.3em]">Messenger</div>
                    <div onclick="openChat(null, 'Избранное')" id="chat-fav" class="flex items-center gap-4 p-4 mx-2 rounded-2xl cursor-pointer transition hover:bg-white/5 mb-2 active">
                        <div class="w-12 h-12 rounded-xl bg-blue-600 flex items-center justify-center shadow-lg"><i class="fa-solid fa-bookmark text-white"></i></div>
                        <div class="text-sm font-bold">Избранное</div>
                    </div>
                    <div id="active-chats"></div>
                </div>

                <!-- ОКНО СООБЩЕНИЙ -->
                <div class="flex-1 flex flex-col bg-black/10 relative">
                    <header class="p-5 border-b border-white/5 flex justify-between items-center bg-white/5">
                        <span id="chat-title" class="font-bold text-sm tracking-widest uppercase">Избранное</span>
                    </header>
                    <div id="box" class="flex-1 overflow-y-auto p-6 space-y-4 flex flex-col"></div>
                    <div class="p-6 flex gap-4 items-center">
                        <input type="text" id="msg" placeholder="Введите сообщение..." class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-sm focus:border-blue-500 transition">
                        <button onclick="send()" class="bg-blue-600 w-14 h-14 rounded-2xl flex items-center justify-center hover:bg-blue-500 shadow-lg transition active:scale-90"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>

            <!-- ВКЛАДКА PIXEL BATTLE -->
            <div id="section-pixel" class="hidden flex-1 flex flex-col p-6 overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-black italic">PIXEL BATTLE <span class="text-[10px] text-gray-500">2500x2500</span></h2>
                    <div class="flex gap-2">
                        <input type="color" id="pixel-color" value="#2563eb" class="bg-transparent border-none w-10 h-10 cursor-pointer">
                        <div class="text-[10px] text-right leading-none">Очистка в<br><b>Пятницу 12:00</b></div>
                    </div>
                </div>
                <div class="canvas-container flex-1 glass">
                    <canvas id="pixel-canvas" width="2500" height="2500"></canvas>
                </div>
            </div>

            <!-- ДРУЗЬЯ -->
            <div id="section-friends" class="hidden flex-1 p-10 overflow-y-auto">
                <h2 class="text-2xl font-black mb-10 italic text-blue-400">ПОИСК ЛЮДЕЙ</h2>
                <div class="flex gap-4 mb-10">
                    <input type="text" id="friend-id-input" placeholder="X3-XXXX" class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-sm font-mono tracking-widest text-blue-400">
                    <button onclick="addFriend()" class="bg-blue-600 px-10 rounded-2xl font-bold transition active:scale-95">НАЙТИ</button>
                </div>
                <div class="grid grid-cols-2 gap-10">
                    <div><h3 class="text-[10px] font-black uppercase text-gray-500 mb-6 tracking-widest">Заявки</h3><div id="requests-list" class="space-y-4"></div></div>
                    <div><h3 class="text-[10px] font-black uppercase text-gray-500 mb-6 tracking-widest">Друзья</h3><div id="friends-list" class="space-y-4"></div></div>
                </div>
            </div>

            <!-- НАСТРОЙКИ -->
            <div id="section-settings" class="hidden flex-1 p-10 overflow-y-auto text-center">
                <div class="glass p-12 rounded-[3.5rem] border border-white/10 mb-10">
                    <div class="relative w-32 h-32 mx-auto mb-6 group">
                        <img id="set-avatar" class="w-full h-full rounded-[2.5rem] border-4 border-blue-600 object-cover shadow-2xl" src="">
                        <label class="absolute inset-0 flex items-center justify-center bg-black/60 opacity-0 group-hover:opacity-100 transition rounded-[2.5rem] cursor-pointer">
                            <i class="fa-solid fa-camera text-2xl"></i>
                            <input type="file" class="hidden" onchange="updateAvatar(this)">
                        </label>
                    </div>
                    <input type="text" id="set-nick" class="bg-transparent text-2xl font-black text-center outline-none border-b-2 border-white/10 focus:border-blue-500 mb-4 w-full">
                    <div id="set-id" class="text-sm font-mono text-blue-400 tracking-widest mb-6">...</div>
                    <button onclick="updateProfileName()" class="bg-blue-600 px-8 py-2 rounded-full font-bold text-xs uppercase transition active:scale-95">Сохранить изменения</button>
                </div>
                <div class="flex justify-center gap-6">
                    <button onclick="setTheme('dark')" class="w-16 h-16 rounded-3xl bg-slate-900 border-2 border-white/10 hover:scale-110 transition shadow-2xl"></button>
                    <button onclick="setTheme('midnight')" class="w-16 h-16 rounded-3xl bg-black border-2 border-white/10 hover:scale-110 transition shadow-2xl"></button>
                    <button onclick="setTheme('neon')" class="w-16 h-16 rounded-3xl bg-pink-500 border-2 border-white/10 hover:scale-110 transition shadow-2xl"></button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const clientSB = supabase.createClient("https://diijudzypthmfdlhhglr.supabase.co", "sb_publishable_cxF0MUM3Gn7Lc_Bi1PIAag_bwyhwANF");
        const REDIRECT_URL = window.location.origin + window.location.pathname;
        let currentUser = null, myShortID = "", currentPartnerId = null;

        // Pixel Battle Vars
        const canvas = document.getElementById('pixel-canvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('pixel-color');

        async function login() { await clientSB.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: REDIRECT_URL } }); }
        async function logout() { await clientSB.auth.signOut(); window.location.reload(); }

        function switchTab(tab) {
            ['chat-sidebar-ui', 'section-friends', 'section-settings', 'section-pixel'].forEach(id => {
                const el = document.getElementById(id);
                el.classList.add('hidden');
            });
            if(tab === 'chat') document.getElementById('chat-sidebar-ui').classList.remove('hidden');
            else document.getElementById('section-' + tab).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            if(tab === 'pixel') initPixelBattle();
            if(tab === 'friends') loadFriendsData();
        }

        // --- ПРОФИЛЬ И БАГИ ---
        async function syncProfile(user) {
            myShortID = "X3-" + user.id.slice(0, 5).toUpperCase();
            const { data: p } = await clientSB.from('profiles').upsert({ 
                id: user.id, 
                short_id: myShortID, 
                full_name: user.user_metadata.full_name, 
                avatar_url: user.user_metadata.avatar_url 
            }).select().single();
            
            document.getElementById('my-avatar').src = p.avatar_url;
            document.getElementById('set-avatar').src = p.avatar_url;
            document.getElementById('set-nick').value = p.full_name;
            document.getElementById('set-id').innerText = "ID: " + p.short_id;
            
            loadChatList();
            loadMessages();
        }

        async function updateProfileName() {
            const newName = document.getElementById('set-nick').value;
            await clientSB.from('profiles').update({ full_name: newName }).eq('id', currentUser.id);
            alert("Обновлено!"); window.location.reload();
        }

        async function updateAvatar(input) {
            const file = input.files[0];
            const path = `avatars/${currentUser.id}_${Date.now()}`;
            await clientSB.storage.from('uploads').upload(path, file);
            const { data: url } = clientSB.storage.from('uploads').getPublicUrl(path);
            await clientSB.from('profiles').update({ avatar_url: url.publicUrl }).eq('id', currentUser.id);
            alert("Аватар обновлен!"); window.location.reload();
        }

        // --- PIXEL BATTLE LOGIC ---
        async function initPixelBattle() {
            const { data: allPixels } = await clientSB.from('pixels').select('*');
            ctx.fillStyle = "white"; ctx.fillRect(0,0,2500,2500);
            if(allPixels) allPixels.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 1, 1);
            });
        }

        canvas.onclick = async (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = Math.floor((e.clientX - rect.left) * scaleX);
            const y = Math.floor((e.clientY - rect.top) * scaleY);
            const color = colorPicker.value;

            ctx.fillStyle = color;
            ctx.fillRect(x, y, 1, 1);
            await clientSB.from('pixels').insert({ x, y, color, user_id: currentUser.id });
        };

        // --- FRIENDS & CHATS FIX ---
        async function addFriend() {
            const val = document.getElementById('friend-id-input').value.trim().toUpperCase();
            const { data: p } = await clientSB.from('profiles').select('id').eq('short_id', val).single();
            if(!p) return alert("ID не найден");
            await clientSB.from('friends').insert({ sender_id: currentUser.id, receiver_id: p.id });
            alert("Заявка отправлена!"); loadFriendsData();
        }

        async function acceptFriend(id) {
            await clientSB.from('friends').update({ status: 'accepted' }).eq('id', id);
            loadFriendsData(); loadChatList();
        }

        async function loadFriendsData() {
            const { data: req } = await clientSB.from('friends').select('id, profiles:sender_id(*)').eq('receiver_id', currentUser.id).eq('status', 'pending');
            document.getElementById('requests-list').innerHTML = (req || []).map(r => `<div class="flex justify-between items-center glass p-3 rounded-2xl"><span>${r.profiles.full_name}</span><button onclick="acceptFriend(${r.id})" class="bg-green-600 px-4 py-1 rounded-xl text-xs font-bold uppercase">Принять</button></div>`).join('') || '<p class="opacity-30">Заявок нет</p>';

            const { data: f1 } = await clientSB.from('friends').select('profiles:receiver_id(*)').eq('sender_id', currentUser.id).eq('status', 'accepted');
            const { data: f2 } = await clientSB.from('friends').select('profiles:sender_id(*)').eq('receiver_id', currentUser.id).eq('status', 'accepted');
            const all = [...(f1 || []), ...(f2 || [])];
            document.getElementById('friends-list').innerHTML = all.map(f => `<div class="flex items-center gap-3 glass p-3 rounded-2xl"><img src="${f.profiles.avatar_url}" class="w-10 h-10 rounded-full border border-blue-500 shadow-lg"><div class="text-sm font-bold">${f.profiles.full_name}</div></div>`).join('') || '<p class="opacity-30">Список пуст</p>';
        }

        async function loadChatList() {
            const { data: f1 } = await clientSB.from('friends').select('profiles:receiver_id(*)').eq('sender_id', currentUser.id).eq('status', 'accepted');
            const { data: f2 } = await clientSB.from('friends').select('profiles:sender_id(*)').eq('receiver_id', currentUser.id).eq('status', 'accepted');
            const all = [...(f1 || []).map(x => x.profiles), ...(f2 || []).map(x => x.profiles)];
            
            document.getElementById('active-chats').innerHTML = all.map(f => `
                <div onclick="openChat('${f.id}', '${f.full_name}')" class="flex items-center gap-4 p-4 mx-2 rounded-2xl cursor-pointer hover:bg-white/5 transition mb-1 ${currentPartnerId === f.id ? 'bg-white/10' : ''}">
                    <img src="${f.avatar_url}" class="w-12 h-12 rounded-xl border border-white/10 shadow-lg">
                    <div class="text-sm font-bold">${f.full_name}</div>
                </div>`).join('');
        }

        function openChat(id, name) {
            currentPartnerId = id; document.getElementById('chat-title').innerText = name;
            loadMessages();
        }

        async function loadMessages() {
            let q = clientSB.from('messagesmessages').select('*');
            if(!currentPartnerId) q = q.eq('sender_id', currentUser.id).is('receiver_id', null);
            else q = q.or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${currentPartnerId}),and(sender_id.eq.${currentPartnerId},receiver_id.eq.${currentUser.id})`);
            const { data } = await q.order('created_at', { ascending: true });
            document.getElementById('box').innerHTML = (data || []).map(m => `<div class="${m.sender_id === currentUser.id ? 'msg-own' : 'msg-other'} px-4 py-2 fade-in max-w-[80%] shadow-xl"><div class="text-[13px]">${m.text}</div></div>`).join('');
            document.getElementById('box').scrollTop = 99999;
        }

        async function send() {
            const i = document.getElementById('msg'); if(!i.value.trim()) return;
            await clientSB.from('messagesmessages').insert([{ text: i.value, sender_id: currentUser.id, receiver_id: currentPartnerId, author_name: currentUser.user_metadata.full_name }]);
            i.value = ''; loadMessages();
        }

        clientSB.auth.onAuthStateChange((ev, session) => {
            if (session) {
                currentUser = session.user;
                document.getElementById('auth-ui').classList.add('hidden');
                document.getElementById('main-ui').classList.remove('hidden');
                syncProfile(currentUser);
                clientSB.channel('gl').on('postgres_changes', { event: '*', schema: 'public', table: 'messagesmessages' }, () => loadMessages())
                .on('postgres_changes', { event: '*', schema: 'public', table: 'friends' }, () => { loadFriendsData(); loadChatList(); })
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'pixels' }, (p) => {
                    ctx.fillStyle = p.new.color;
                    ctx.fillRect(p.new.x, p.new.y, 1, 1);
                }).subscribe();
            }
        });

        function setTheme(t) { document.body.className = t === 'dark' ? '' : 'theme-' + t; localStorage.setItem('th_x3', t); }
        setTheme(localStorage.getItem('th_x3') || 'dark');
        document.getElementById('msg').onkeypress = e => { if (e.key === 'Enter') send(); };
    </script>
</body>
</html>
