<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X3 Messenger | Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #020617; --card: rgba(255,255,255,0.03); --primary: #2563eb; }
        .theme-midnight { --bg: #000000; --primary: #1e1e1e; }
        .theme-neon { --bg: #0f172a; --primary: #f472b6; }
        body { background: var(--bg); color: white; font-family: sans-serif; height: 100vh; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .glass { background: var(--card); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        .msg-own { align-self: flex-end; background: var(--primary); border-radius: 18px 18px 0 18px; padding: 10px 15px; max-width: 80%; word-wrap: break-word; }
        .msg-other { align-self: flex-start; background: rgba(255,255,255,0.1); border-radius: 18px 18px 18px 0; padding: 10px 15px; max-width: 80%; word-wrap: break-word; }
        .msg-time { font-size: 0.75rem; opacity: 0.6; margin-top: 4px; }
        .msg-read { color: #4ade80; }
        .nav-btn { opacity: 0.3; cursor: pointer; padding: 12px; transition: 0.3s; }
        .nav-btn.active { opacity: 1; color: var(--primary); transform: scale(1.2); }
        #main-ui { width: 100%; max-width: 1200px; height: 95vh; display: grid; grid-template-columns: 80px 1fr; }
        
        /* Pixel Battle */
        .pixel-wrapper { position: relative; width: 100%; height: 100%; overflow: hidden; background: #111; border-radius: 20px; }
        #pixel-canvas { image-rendering: pixelated; position: absolute; transform-origin: 0 0; cursor: crosshair; background: white; }
        #pixel-overlay { position: absolute; pointer-events: none; opacity: 0.3; }
        .pixel-controls { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        .pixel-info { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 10px 15px; border-radius: 10px; font-size: 12px; z-index: 10; }

        /* Chat items */
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px; margin: 0 8px; border-radius: 16px; cursor: pointer; transition: 0.3s; position: relative; }
        .chat-item:hover { background: rgba(255, 255, 255, 0.08); }
        .chat-item.blocked { opacity: 0.5; }
        .unread-badge { position: absolute; top: 8px; right: 8px; background: #ef4444; width: 8px; height: 8px; border-radius: 50%; }
        
        /* Animation */
        .rec-pulse { animation: pulse 1s infinite; color: #ef4444; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        video { width: 100%; max-width: 300px; border-radius: 15px; background: black; }
        
        /* Notifications */
        .notification { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.9); border-left: 4px solid var(--primary); padding: 15px 20px; border-radius: 8px; z-index: 1000; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(400px); } to { transform: translateX(0); } }
        .notification.success { border-left-color: #4ade80; }
        .notification.error { border-left-color: #ef4444; }
        .notification.warning { border-left-color: #eab308; }
    </style>
</head>
<body>

    <div id="auth-ui" class="glass p-12 rounded-[3rem] text-center w-full max-w-sm mx-4 shadow-2xl">
        <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center text-4xl font-black italic mx-auto mb-8 shadow-xl">X3</div>
        <button onclick="login()" class="w-full bg-white text-black py-4 rounded-2xl font-bold flex items-center justify-center gap-3 transition hover:scale-105">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Войти через Google
        </button>
    </div>

    <div id="main-ui" class="hidden glass sm:rounded-[3rem] overflow-hidden shadow-2xl">
        
        <div class="bg-black/40 flex flex-col items-center py-8 border-r border-white/5">
            <img id="my-avatar" class="w-12 h-12 rounded-full mb-10 border-2 border-blue-500 shadow-lg cursor-pointer" onclick="switchTab('settings')">
            <div class="flex flex-col gap-8 flex-1 text-2xl text-white">
                <i onclick="switchTab('chat')" id="tab-chat" class="fa-solid fa-comment-dots nav-btn active"></i>
                <i onclick="switchTab('friends')" id="tab-friends" class="fa-solid fa-user-plus nav-btn"></i>
                <i onclick="switchTab('pixel')" id="tab-pixel" class="fa-solid fa-palette nav-btn"></i>
                <i onclick="switchTab('settings')" id="tab-settings" class="fa-solid fa-gear nav-btn"></i>
            </div>
            <button onclick="logout()" class="text-red-500 p-4 opacity-50 hover:opacity-100 transition"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <div class="flex flex-1 overflow-hidden">
            
            <div id="chat-sidebar-ui" class="flex flex-row flex-1 overflow-hidden">
                <div class="w-72 bg-black/20 border-r border-white/5 overflow-y-auto">
                    <div class="p-6 text-[10px] font-black uppercase text-blue-500 tracking-[0.3em]">Messenger</div>
                    <div onclick="openChat(null, 'Избранное')" id="chat-fav" class="flex items-center gap-4 p-4 mx-2 rounded-2xl cursor-pointer transition hover:bg-white/5 mb-1 active">
                        <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center shadow-lg"><i class="fa-solid fa-bookmark text-white"></i></div>
                        <div class="text-sm font-bold">Избранное</div>
                    </div>
                    <div id="active-chats"></div>
                </div>

                <div class="flex-1 flex flex-col bg-black/10 relative">
                    <header class="p-5 border-b border-white/5 flex justify-between items-center bg-white/5">
                        <span id="chat-title" class="font-bold text-sm text-blue-400 uppercase italic">Избранное</span>
                        <div id="chat-actions" class="hidden flex gap-5 text-gray-400">
                            <i onclick="startCall(false)" class="fa-solid fa-phone hover:text-green-500 cursor-pointer"></i>
                            <i onclick="startCall(true)" class="fa-solid fa-video hover:text-blue-500 cursor-pointer"></i>
                            <i onclick="deleteChatForEveryone()" class="fa-solid fa-trash hover:text-red-500 cursor-pointer" title="Удалить для всех"></i>
                            <i onclick="blockUser()" class="fa-solid fa-ban hover:text-red-500 cursor-pointer" title="Блок"></i>
                        </div>
                    </header>

                    <div id="video-container" class="hidden absolute inset-0 z-50 bg-black p-4 flex flex-col items-center">
                        <video id="remote-video" autoplay class="h-full"></video>
                        <video id="local-video" autoplay muted class="w-32 absolute bottom-20 right-10 border border-white"></video>
                        <button onclick="location.reload()" class="bg-red-600 px-8 py-3 rounded-full mt-4 font-bold">ЗАВЕРШИТЬ</button>
                    </div>

                    <div id="box" class="flex-1 overflow-y-auto p-6 space-y-4 flex flex-col text-sm"></div>

                    <div class="p-4 flex gap-4 items-center bg-black/20">
                        <label class="cursor-pointer text-gray-500 hover:text-white"><i class="fa-solid fa-paperclip text-xl"></i><input type="file" id="fileInput" class="hidden" onchange="uploadMedia()"></label>
                        <button id="micBtn" class="text-gray-500 hover:text-red-500"><i class="fa-solid fa-microphone text-xl" id="micIcon"></i></button>
                        <input type="text" id="msg" placeholder="Написать..." class="flex-1 bg-white/5 border-none p-3 rounded-xl outline-none focus:ring-1 focus:ring-blue-500 transition">
                        <button onclick="send()" class="bg-blue-600 w-12 h-12 rounded-xl flex items-center justify-center hover:bg-blue-500 transition shadow-lg"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>

            <div id="section-pixel" class="hidden flex-1 flex flex-col p-6 overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-black italic">PIXEL BATTLE</h2>
                    <input type="color" id="pixel-color" value="#2563eb" class="bg-transparent border-none w-10 h-10">
                </div>
                <div class="pixel-wrapper glass" id="pixel-wrapper">
                    <canvas id="pixel-canvas" width="2500" height="2500"></canvas>
                </div>
                <div class="text-[9px] text-gray-500 mt-2">ЛКМ: Рисовать | Shift+ЛКМ или ПКМ: Двигать | Колесико: Зум</div>
            </div>

            <div id="section-friends" class="hidden flex-1 p-10 overflow-y-auto">
                <h2 class="text-xl font-black mb-8 italic text-blue-400">ПОИСК ДРУЗЕЙ</h2>
                <div class="flex gap-4 mb-10"><input type="text" id="friend-id-input" placeholder="X3-XXXX" class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-sm font-mono text-blue-400"><button onclick="addFriend()" class="bg-blue-600 px-10 rounded-2xl font-bold uppercase text-xs">Найти</button></div>
                <div class="grid grid-cols-2 gap-10">
                    <div><h3 class="text-[10px] font-bold text-gray-500 uppercase mb-4 tracking-widest">Заявки</h3><div id="requests-list" class="space-y-3"></div></div>
                    <div><h3 class="text-[10px] font-bold text-gray-500 uppercase mb-4 tracking-widest">Друзья</h3><div id="friends-list" class="space-y-3"></div></div>
                </div>
            </div>

            <div id="section-settings" class="hidden flex-1 p-10 overflow-y-auto text-center">
                <div class="glass p-10 rounded-[3rem] border border-white/10 mb-10">
                    <div class="relative w-24 h-24 mx-auto mb-6 group">
                        <img id="set-avatar" class="w-full h-full rounded-2xl object-cover border-2 border-blue-500 shadow-xl">
                        <label class="absolute inset-0 flex items-center justify-center bg-black/60 opacity-0 group-hover:opacity-100 transition rounded-2xl cursor-pointer"><i class="fa-solid fa-camera"></i><input type="file" class="hidden" onchange="updateAvatar(this)"></label>
                    </div>
                    <input type="text" id="set-nick" class="bg-transparent text-xl font-black text-center outline-none border-b border-white/10 mb-4 w-full">
                    <div id="set-id" class="text-[10px] font-mono text-blue-400 mb-6 uppercase">ID: ...</div>
                    <button onclick="updateProfileName()" class="bg-blue-600 px-6 py-2 rounded-full font-bold text-[10px] uppercase">Сохранить ник</button>
                </div>
                <div class="flex justify-center gap-6">
                    <button onclick="setTheme('dark')" class="w-12 h-12 rounded-xl bg-slate-900 border border-white/10"></button>
                    <button onclick="setTheme('midnight')" class="w-12 h-12 rounded-xl bg-black border border-white/10"></button>
                    <button onclick="setTheme('neon')" class="w-12 h-12 rounded-xl bg-pink-500 border border-white/10"></button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const clientSB = supabase.createClient("https://diijudzypthmfdlhhglr.supabase.co", "sb_publishable_cxF0MUM3Gn7Lc_Bi1PIAag_bwyhwANF");
        const REDIRECT_URL = window.location.origin + window.location.pathname;
        let currentUser = null, myShortID = "", currentPartnerId = null, peer = null;
        let scale = 1, offsetX = 0, offsetY = 0, isPanning = false, isDrawing = false;
        let unreadCounts = {};

        // --- NOTIFICATIONS ---
        function showNotification(msg, type = 'info') {
            const notif = document.createElement('div');
            notif.className = `notification fade-in ${type}`;
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        async function login() { await clientSB.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: REDIRECT_URL } }); }
        async function logout() { await clientSB.auth.signOut(); window.location.reload(); }

        // --- PIXEL BATTLE ---
        const canvas = document.getElementById('pixel-canvas');
        const wrapper = document.getElementById('pixel-wrapper');
        const ctx = canvas.getContext('2d');

        // Отрисовка сетки
        function drawGrid() {
            const overlay = document.getElementById('pixel-overlay') || document.createElement('canvas');
            overlay.id = 'pixel-overlay';
            overlay.width = canvas.width;
            overlay.height = canvas.height;
            overlay.style.position = 'absolute';
            overlay.style.pointerEvents = 'none';
            wrapper.appendChild(overlay);
            
            const octx = overlay.getContext('2d');
            octx.strokeStyle = 'rgba(100,100,100,0.2)';
            octx.lineWidth = 0.5;
            
            for(let i = 0; i <= 2500; i += 100) {
                octx.beginPath();
                octx.moveTo(i, 0);
                octx.lineTo(i, 2500);
                octx.stroke();
                octx.beginPath();
                octx.moveTo(0, i);
                octx.lineTo(2500, i);
                octx.stroke();
            }
        }

        wrapper.onwheel = (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale *= delta;
            if(scale < 0.1) scale = 0.1; if(scale > 20) scale = 20;
            updateCanvasTransform();
        };

        wrapper.onmousedown = (e) => {
            if((e.button === 0 && e.shiftKey) || e.button === 2) { isPanning = true; e.preventDefault(); }
            else if(e.button === 0) { isDrawing = true; drawPixel(e); }
        };

        window.onmouseup = () => { isPanning = false; isDrawing = false; };
        wrapper.oncontextmenu = (e) => e.preventDefault();
        
        wrapper.onmousemove = (e) => {
            if(isPanning) { offsetX += e.movementX; offsetY += e.movementY; updateCanvasTransform(); }
            else if(isDrawing) { drawPixel(e); }
        };

        function updateCanvasTransform() {
            canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
            const overlay = document.getElementById('pixel-overlay');
            if(overlay) overlay.style.transform = canvas.style.transform;
        }

        async function drawPixel(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / scale - offsetX / scale);
            const y = Math.floor((e.clientY - rect.top) / scale - offsetY / scale);
            
            if(x < 0 || x >= 2500 || y < 0 || y >= 2500) return;
            
            const color = document.getElementById('pixel-color').value;
            ctx.fillStyle = color;
            ctx.fillRect(x, y, 1, 1);
            
            try {
                await clientSB.from('pixels').insert({ x, y, color, user_id: currentUser.id, author_name: currentUser.user_metadata.full_name });
            } catch(e) { console.error('Ошибка рисования:', e); }
        }


        // --- MESSENGER FEATURES ---
        async function syncProfile(user) {
            myShortID = "X3-" + user.id.slice(0, 5).toUpperCase();
            const { data: p } = await clientSB.from('profiles').upsert({ id: user.id, short_id: myShortID, full_name: user.user_metadata.full_name, avatar_url: user.user_metadata.avatar_url }).select().single();
            
            document.getElementById('my-avatar').src = p.avatar_url;
            document.getElementById('set-avatar').src = p.avatar_url;
            document.getElementById('set-nick').value = p.full_name;
            document.getElementById('set-id').innerText = "ID: " + p.short_id;

            peer = new Peer(user.id);
            peer.on('call', async (call) => {
                if(confirm("Входящий звонок! Ответить?")) {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                        document.getElementById('video-container').classList.remove('hidden');
                        document.getElementById('local-video').srcObject = stream;
                        call.answer(stream);
                        call.on('stream', rem => { document.getElementById('remote-video').srcObject = rem; });
                    } catch(e) { showNotification('Нет доступа к камере/микрофону', 'error'); }
                }
            });
            loadChatList();
            loadMessages();
        }

        async function uploadMedia() {
            if(!currentPartnerId) { showNotification('Выберите чат сначала', 'warning'); return; }
            const file = document.getElementById('fileInput').files[0];
            if(!file) return;
            try {
                const name = `media/${Date.now()}_${file.name}`;
                await clientSB.storage.from('uploads').upload(name, file);
                const { data } = clientSB.storage.from('uploads').getPublicUrl(name);
                let type = file.type.startsWith('image') ? 'image' : (file.type.startsWith('video') ? 'video' : 'file');
                await clientSB.from('messagesmessages').insert([{ text: data.publicUrl, sender_id: currentUser.id, receiver_id: currentPartnerId, type, author_name: currentUser.user_metadata.full_name }]);
                document.getElementById('fileInput').value = '';
                showNotification('Файл отправлен!', 'success');
            } catch(e) { showNotification('Ошибка загрузки: ' + e.message, 'error'); }
        }

        // Голосовые сообщения
        let recorder;
        document.getElementById('micBtn').onclick = async () => {
            if(!currentPartnerId) { showNotification('Выберите чат для записи', 'warning'); return; }
            const icon = document.getElementById('micIcon');
            if(!recorder || recorder.state === 'inactive') {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    recorder = new MediaRecorder(stream);
                    let chunks = [];
                    recorder.ondataavailable = e => chunks.push(e.data);
                    recorder.onstop = async () => {
                        try {
                            const blob = new Blob(chunks, { type: 'audio/webm' });
                            const name = `voice/${Date.now()}.webm`;
                            await clientSB.storage.from('uploads').upload(name, blob);
                            const { data } = clientSB.storage.from('uploads').getPublicUrl(name);
                            await clientSB.from('messagesmessages').insert([{ text: data.publicUrl, sender_id: currentUser.id, receiver_id: currentPartnerId, type: 'audio', author_name: currentUser.user_metadata.full_name }]);
                            showNotification('Голосовое отправлено!', 'success');
                        } catch(e) { showNotification('Ошибка отправки ГС: ' + e.message, 'error'); }
                    };
                    recorder.start();
                    icon.classList.add('rec-pulse');
                    showNotification('Запись началась...', 'info');
                } catch(e) { showNotification('Нет доступа к микрофону', 'error'); }
            } else {
                recorder.stop();
                icon.classList.remove('rec-pulse');
            }
        };

        async function startCall(v) {
            if(!currentPartnerId) { showNotification('Выберите контакт', 'warning'); return; }
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: v, audio: true });
                document.getElementById('video-container').classList.remove('hidden');
                document.getElementById('local-video').srcObject = s;
                const call = peer.call(currentPartnerId, s);
                call.on('stream', rem => { document.getElementById('remote-video').srcObject = rem; });
                showNotification(v ? 'Видео звонок начат' : 'Аудио звонок начат', 'success');
            } catch(e) { showNotification('Ошибка звонка: ' + e.message, 'error'); }
        }

        async function blockUser() {
            if(!currentPartnerId) { showNotification('Выберите пользователя', 'warning'); return; }
            if(confirm('Заблокировать этого пользователя?')) {
                try {
                    await clientSB.from('blocks').insert({ blocker_id: currentUser.id, blocked_id: currentPartnerId }).onConflict('blocker_id,blocked_id').ignore();
                    showNotification('Пользователь заблокирован', 'success');
                    loadChatList();
                } catch(e) { 
                    if(e.message.includes('duplicate')) {
                        showNotification('Уже заблокирован', 'info');
                    } else {
                        showNotification('Ошибка блокировки: ' + e.message, 'error');
                    }
                }
            }
        }

        async function unblockUser(userId) {
            try {
                await clientSB.from('blocks').delete().eq('blocker_id', currentUser.id).eq('blocked_id', userId);
                showNotification('Пользователь разблокирован', 'success');
                loadChatList();
            } catch(e) { showNotification('Ошибка разблокировки', 'error'); }
        }

        async function deleteChatForEveryone() {
            if(!currentPartnerId) { showNotification('Нет активного чата', 'warning'); return; }
            if(confirm("Удалить всю переписку для ОБОИХ?")) {
                try {
                    await clientSB.from('messagesmessages').delete().or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${currentPartnerId}),and(sender_id.eq.${currentPartnerId},receiver_id.eq.${currentUser.id})`);
                    loadMessages();
                    showNotification('Чат удален для всех', 'success');
                } catch(e) { showNotification('Ошибка удаления', 'error'); }
            }
        }

        // --- СТАНДАРТНАЯ ЛОГИКА ---
        function switchTab(t) {
            ['chat-sidebar-ui', 'section-friends', 'section-pixel', 'section-settings'].forEach(id => document.getElementById(id).classList.add('hidden'));
            if(t === 'chat') document.getElementById('chat-sidebar-ui').classList.remove('hidden');
            else document.getElementById('section-' + t).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            if(t === 'pixel') initPixelBattle();
        }

        async function initPixelBattle() {
            drawGrid();
            const { data } = await clientSB.from('pixels').select('*').order('created_at', { ascending: false }).limit(50000);
            ctx.fillStyle = "white"; 
            ctx.fillRect(0,0,2500,2500);
            if(data) {
                const pixelMap = {};
                data.forEach(p => { pixelMap[p.x + '_' + p.y] = p; });
                Object.values(pixelMap).forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 1, 1); });
            }
            showNotification('Pixel Battle загружен', 'success');
        }

        async function openChat(id, name) {
            currentPartnerId = id;
            document.getElementById('chat-title').innerText = name;
            document.getElementById('chat-actions').classList.toggle('hidden', !id);
            
            // Проверка блокировки
            if(id) {
                const { data: blocks } = await clientSB.from('blocks').select('*').or(`and(blocker_id.eq.${currentUser.id},blocked_id.eq.${id}),and(blocker_id.eq.${id},blocked_id.eq.${currentUser.id})`);
                if(blocks && blocks.length > 0) {
                    document.getElementById('box').innerHTML = '<div class="text-center opacity-50">❌ Пользователь заблокирован</div>';
                    return;
                }
            }
            
            loadMessages();
        }

        async function loadMessages() {
            let q = clientSB.from('messagesmessages').select('*');
            if(!currentPartnerId) q = q.eq('sender_id', currentUser.id).is('receiver_id', null);
            else q = q.or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${currentPartnerId}),and(sender_id.eq.${currentPartnerId},receiver_id.eq.${currentUser.id})`);
            const { data } = await q.order('created_at', { ascending: true });
            document.getElementById('box').innerHTML = (data || []).map(m => {
                let content = m.text;
                if(m.type === 'image') content = `<img src="${m.text}" class="rounded-xl max-h-60" onclick="window.open('${m.text}')">`;
                if(m.type === 'video') content = `<video src="${m.text}" controls class="rounded-xl max-h-60"></video>`;
                if(m.type === 'audio') content = `<audio src="${m.text}" controls class="h-8 w-44"></audio>`;
                if(m.type === 'file') content = `<a href="${m.text}" target="_blank" class="text-blue-400 underline font-bold italic">📄 Файл</a>`;
                
                const time = new Date(m.created_at).toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
                const readMark = m.read_at ? '<span class="msg-read">✓✓</span>' : '<span>✓</span>';
                
                return `<div class="${m.sender_id === currentUser.id ? 'msg-own' : 'msg-other'}">
                    <div>${content}</div>
                    <div class="msg-time">${time} ${m.sender_id === currentUser.id ? readMark : ''}</div>
                </div>`;
            }).join('');
            document.getElementById('box').scrollTop = 99999;
        }

        async function send() {
            const val = document.getElementById('msg').value.trim(); 
            if(!val) return;
            if(currentPartnerId === undefined) { alert('Выберите чат сначала'); return; }
            
            try {
                await clientSB.from('messagesmessages').insert([{ 
                    text: val, 
                    sender_id: currentUser.id, 
                    receiver_id: currentPartnerId, 
                    author_name: currentUser.user_metadata.full_name, 
                    type: 'text' 
                }]);
                document.getElementById('msg').value = '';
            } catch(e) { showNotification('Ошибка отправки', 'error'); }
        }

        async function addFriend() {
            const val = document.getElementById('friend-id-input').value.trim().toUpperCase();
            if(!val) { showNotification('Введите ID', 'warning'); return; }
            try {
                const { data: p } = await clientSB.from('profiles').select('id').eq('short_id', val).single();
                if(!p) { showNotification("ID не найден", 'error'); return; }
                if(p.id === currentUser.id) { showNotification('Нельзя добавить себя', 'warning'); return; }
                
                await clientSB.from('friends').insert({ sender_id: currentUser.id, receiver_id: p.id });
                showNotification("Заявка отправлена!", 'success');
                document.getElementById('friend-id-input').value = '';
                loadFriendsData();
            } catch(e) {
                if(e.message.includes('duplicate')) {
                    showNotification('Уже добавлен в друзья', 'info');
                } else {
                    showNotification('Ошибка: ' + e.message, 'error');
                }
            }
        }

        async function acceptFriend(id) { 
            try {
                await clientSB.from('friends').update({ status: 'accepted' }).eq('id', id);
                showNotification('Друг добавлен!', 'success');
                loadFriendsData();
                loadChatList();
            } catch(e) { showNotification('Ошибка', 'error'); }
        }

        async function removeFriend(friendId) {
            if(!confirm('Удалить из друзей?')) return;
            try {
                await clientSB.from('friends').delete().eq('id', friendId);
                showNotification('Удалено из друзей', 'success');
                loadFriendsData();
                loadChatList();
            } catch(e) { showNotification('Ошибка удаления', 'error'); }
        }

        async function loadFriendsData() {
            try {
                const { data: req } = await clientSB.from('friends').select('id, profiles:sender_id(*)').eq('receiver_id', currentUser.id).eq('status', 'pending');
                document.getElementById('requests-list').innerHTML = (req || []).map(r => `<div class="flex justify-between items-center glass p-3 rounded-xl"><span>${r.profiles.full_name}</span><button onclick="acceptFriend(${r.id})" class="bg-green-600 px-4 py-1 rounded-xl text-xs font-bold uppercase hover:bg-green-500">Принять</button></div>`).join('') || '<p class="opacity-30 italic text-xs">Заявок нет</p>';
                
                const { data: f1 } = await clientSB.from('friends').select('id, profiles:receiver_id(*)').eq('sender_id', currentUser.id).eq('status', 'accepted');
                const { data: f2 } = await clientSB.from('friends').select('id, profiles:sender_id(*)').eq('receiver_id', currentUser.id).eq('status', 'accepted');
                
                const allFriends = [...(f1 || []), ...(f2 || [])];
                document.getElementById('friends-list').innerHTML = allFriends.map(f => `<div class="flex justify-between items-center gap-3 glass p-3 rounded-xl">
                    <div class="flex items-center gap-3 flex-1 cursor-pointer" onclick="openChat('${f.profiles.id}', '${f.profiles.full_name}')">
                        <img src="${f.profiles.avatar_url}" class="w-8 h-8 rounded-full border border-blue-500 shadow-lg">
                        <div class="text-sm font-bold">${f.profiles.full_name}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="blockUser()" style="color: currentColor; cursor: pointer;" title="Заблокировать"><i class="fa-solid fa-ban text-xs opacity-50 hover:opacity-100"></i></button>
                        <button onclick="removeFriend(${f.id})" class="text-red-500 hover:text-red-400 opacity-50 hover:opacity-100 transition" title="Удалить"><i class="fa-solid fa-trash text-xs"></i></button>
                    </div>
                </div>`).join('') || '<p class="opacity-30 italic text-xs">Список пуст</p>';
            } catch(e) { showNotification('Ошибка загрузки друзей', 'error'); }
        }

        async function loadChatList() {
            try {
                const { data: f1 } = await clientSB.from('friends').select('profiles:receiver_id(*)').eq('sender_id', currentUser.id).eq('status', 'accepted');
                const { data: f2 } = await clientSB.from('friends').select('profiles:sender_id(*)').eq('receiver_id', currentUser.id).eq('status', 'accepted');
                
                const { data: blocks } = await clientSB.from('blocks').select('blocked_id').eq('blocker_id', currentUser.id);
                const blockedIds = (blocks || []).map(b => b.blocked_id);
                
                const html = [...(f1 || []), ...(f2 || [])].map(f => {
                    const isBlocked = blockedIds.includes(f.profiles.id);
                    return `<div onclick="openChat('${f.profiles.id}', '${f.profiles.full_name}')" class="chat-item ${isBlocked ? 'blocked' : ''}" title="${isBlocked ? '🚫 Заблокирован' : ''}">
                        <img src="${f.profiles.avatar_url}" class="w-10 h-10 rounded-xl border border-white/10 shadow-lg">
                        <div class="text-sm font-bold">${f.profiles.full_name}</div>
                        <div class="unread-badge" id="badge-${f.profiles.id}" style="display: none;"></div>
                    </div>`;
                }).join('');
                document.getElementById('active-chats').innerHTML = html;
            } catch(e) { showNotification('Ошибка загрузки чатов', 'error'); }
        }

        async function updateProfileName() {
            const name = document.getElementById('set-nick').value.trim();
            if(!name) { showNotification('Введите имя', 'warning'); return; }
            try {
                await clientSB.from('profiles').update({ full_name: name }).eq('id', currentUser.id);
                showNotification('Имя обновлено!', 'success');
            } catch(e) { showNotification('Ошибка обновления', 'error'); }
        }

        async function updateAvatar(input) {
            if(!input.files[0]) return;
            try {
                const file = input.files[0];
                const path = `avatars/${currentUser.id}_${Date.now()}.png`;
                await clientSB.storage.from('uploads').upload(path, file);
                const { data } = clientSB.storage.from('uploads').getPublicUrl(path);
                await clientSB.from('profiles').update({ avatar_url: data.publicUrl }).eq('id', currentUser.id);
                document.getElementById('my-avatar').src = data.publicUrl;
                document.getElementById('set-avatar').src = data.publicUrl;
                showNotification('Аватар обновлен!', 'success');
            } catch(e) { showNotification('Ошибка загрузки аватара', 'error'); }
        }

        clientSB.auth.onAuthStateChange((ev, session) => {
            if (session) {
                currentUser = session.user;
                document.getElementById('auth-ui').classList.add('hidden');
                document.getElementById('main-ui').classList.remove('hidden');
                syncProfile(currentUser);
                clientSB.channel('gl')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'messagesmessages' }, () => loadMessages())
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'friends' }, () => { loadFriendsData(); loadChatList(); })
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'pixels' }, (p) => { ctx.fillStyle = p.new.color; ctx.fillRect(p.new.x, p.new.y, 1, 1); })
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'blocks' }, () => loadChatList())
                    .subscribe();
                showNotification('Добро пожаловать в X3!', 'success');
            }
        });

        function setTheme(t) { document.body.className = t === 'dark' ? '' : 'theme-' + t; localStorage.setItem('th_x3', t); showNotification('Тема изменена', 'info'); }
        setTheme(localStorage.getItem('th_x3') || 'dark');
        document.getElementById('msg').onkeypress = e => { if (e.key === 'Enter') send(); };
    </script>
</body>
</html>
