<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X3 Messenger | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #020617; --card: rgba(255,255,255,0.03); --primary: #2563eb; }
        .theme-midnight { --bg: #000000; --primary: #1e1e1e; }
        .theme-neon { --bg: #0f172a; --primary: #f472b6; }
        body { background: var(--bg); color: white; font-family: sans-serif; height: 100vh; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        .msg-own { align-self: flex-end; background: var(--primary); border-radius: 15px 15px 0 15px; }
        .msg-other { align-self: flex-start; background: rgba(255,255,255,0.1); border-radius: 15px 15px 15px 0; }
        .nav-btn { opacity: 0.5; transition: 0.3s; cursor: pointer; }
        .nav-btn.active { opacity: 1; color: var(--primary); transform: scale(1.1); }
        #main-ui { width: 100%; max-width: 500px; height: 90vh; }
        @media (min-width: 1024px) { #main-ui { max-width: 800px; } }
        #box::-webkit-scrollbar { width: 4px; }
        #box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <!-- ВХОД -->
    <div id="auth-ui" class="glass p-10 rounded-[2.5rem] text-center w-full max-w-sm mx-4 shadow-2xl">
        <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center text-4xl font-black italic mx-auto mb-6">X3</div>
        <h1 class="text-3xl font-black mb-10 italic tracking-tighter">X3 Messenger</h1>
        <button onclick="login()" class="w-full bg-white text-black py-4 rounded-2xl font-bold flex items-center justify-center gap-3 hover:scale-95 transition shadow-xl">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Войти через Google
        </button>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="main-ui" class="hidden glass sm:rounded-[2.5rem] flex flex-col overflow-hidden shadow-2xl transition-all">
        
        <!-- HEADER -->
        <header class="p-4 sm:p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
            <div class="flex items-center gap-3">
                <img id="my-avatar" class="w-10 h-10 rounded-full border-2 border-blue-500 shadow-lg" src="">
                <div>
                    <div id="my-nickname" class="font-bold text-sm tracking-tight text-white">Загрузка...</div>
                    <div id="my-id" class="text-[9px] text-blue-400 font-mono tracking-tighter uppercase">ID: X3-XXXX</div>
                </div>
            </div>
            <div class="flex gap-6 text-xl">
                <i onclick="switchTab('chat')" id="tab-chat" class="fa-solid fa-comment-dots nav-btn active"></i>
                <i onclick="switchTab('friends')" id="tab-friends" class="fa-solid fa-users nav-btn"></i>
                <i onclick="switchTab('settings')" id="tab-settings" class="fa-solid fa-gear nav-btn"></i>
            </div>
        </header>

        <!-- ВКЛАДКА: ЧАТ -->
        <div id="section-chat" class="flex-1 flex flex-col p-4 overflow-hidden">
            <div id="box" class="flex-1 overflow-y-auto space-y-3 pr-2 flex flex-col mb-4"></div>
            <div class="flex gap-2 p-2 bg-white/5 rounded-2xl border border-white/10">
                <input type="text" id="msg" placeholder="Введите сообщение..." class="flex-1 bg-transparent border-none p-2 outline-none text-sm text-white">
                <button onclick="send()" class="bg-blue-600 px-5 py-3 rounded-xl font-bold transition hover:bg-blue-500 shadow-lg">
                    <i class="fa-solid fa-paper-plane text-white"></i>
                </button>
            </div>
        </div>

        <!-- ВКЛАДКА: ДРУЗЬЯ -->
        <div id="section-friends" class="hidden flex-1 p-6 sm:p-10 overflow-y-auto">
            <h2 class="text-xl font-bold mb-6 italic text-blue-400 tracking-tighter">Найти друзей</h2>
            <div class="flex gap-2 mb-10">
                <input type="text" id="friend-id-input" placeholder="Введите X3-ID (напр. X3-A1B2)" class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-sm text-white focus:border-blue-500 transition">
                <button onclick="addFriend()" class="bg-blue-600 px-6 rounded-2xl font-bold text-xs uppercase shadow-lg">Найти</button>
            </div>
            <h2 class="text-[10px] font-black text-gray-500 uppercase mb-6 tracking-[0.2em] border-b border-white/5 pb-2">Список контактов</h2>
            <div id="friends-list" class="space-y-4">
                <!-- Друзья появятся тут -->
            </div>
        </div>

        <!-- ВКЛАДКА: НАСТРОЙКИ -->
        <div id="section-settings" class="hidden flex-1 p-6 sm:p-10 overflow-y-auto">
            <h2 class="text-xl font-bold mb-10 italic tracking-tighter">Настройки</h2>
            <div class="space-y-8">
                <div class="bg-white/5 p-5 rounded-[1.5rem] border border-white/10">
                    <div class="text-[10px] text-gray-500 font-black uppercase mb-1 tracking-widest">Конфиденциальная почта</div>
                    <div id="settings-email" class="text-xs font-mono text-blue-200">...</div>
                </div>
                <div>
                    <div class="text-[10px] text-gray-500 font-black uppercase mb-4 tracking-widest">Визуальная тема</div>
                    <div class="flex gap-4">
                        <div onclick="setTheme('dark')" class="w-12 h-12 rounded-2xl bg-slate-900 border-2 border-white/10 cursor-pointer shadow-xl hover:scale-110 transition"></div>
                        <div onclick="setTheme('midnight')" class="w-12 h-12 rounded-2xl bg-black border-2 border-white/10 cursor-pointer shadow-xl hover:scale-110 transition"></div>
                        <div onclick="setTheme('neon')" class="w-12 h-12 rounded-2xl bg-pink-500 border-2 border-white/10 cursor-pointer shadow-xl hover:scale-110 transition"></div>
                    </div>
                </div>
                <div class="pt-10 flex flex-col gap-4">
                    <button onclick="logout()" class="w-full py-4 rounded-2xl bg-white/5 border border-white/10 font-bold text-xs uppercase tracking-widest hover:bg-white/10 transition">Выйти из системы</button>
                    <button onclick="deleteMyData()" class="w-full py-4 rounded-2xl bg-red-900/10 text-red-500 font-bold text-xs uppercase tracking-widest border border-red-900/20 hover:bg-red-900/20 transition">Стереть историю сообщений</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const clientSB = supabase.createClient("https://diijudzypthmfdlhhglr.supabase.co", "sb_publishable_cxF0MUM3Gn7Lc_Bi1PIAag_bwyhwANF");
        const REDIRECT_URL = "https://v45972326-ops.github.io/xzmesseng/";
        
        let currentUser = null, myShortID = "";

        async function login() { await clientSB.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: REDIRECT_URL } }); }
        async function logout() { await clientSB.auth.signOut(); window.location.reload(); }

        // Обновление/создание профиля при входе
        async function syncProfile(user) {
            myShortID = "X3-" + user.id.slice(0, 4).toUpperCase();
            await clientSB.from('profiles').upsert({
                id: user.id,
                short_id: myShortID,
                full_name: user.user_metadata.full_name,
                avatar_url: user.user_metadata.avatar_url
            });
            document.getElementById('my-nickname').innerText = user.user_metadata.full_name;
            document.getElementById('my-id').innerText = "ID: " + myShortID;
            document.getElementById('my-avatar').src = user.user_metadata.avatar_url;
            document.getElementById('settings-email').innerText = user.email;
        }

        // РЕАЛЬНОЕ ДОБАВЛЕНИЕ ДРУГА
        async function addFriend() {
            const input = document.getElementById('friend-id-input').value.trim().toUpperCase();
            if (!input) return;
            if (input === myShortID) return alert("Нельзя добавить самого себя!");

            // 1. Ищем человека в таблице profiles
            const { data: person, error } = await clientSB.from('profiles').select('id').eq('short_id', input).single();
            
            if (error || !person) {
                alert("Пользователь с таким ID не найден! Проверьте ID еще раз.");
            } else {
                // 2. Добавляем связь в таблицу friends
                const { error: fError } = await clientSB.from('friends').insert({
                    user_id: currentUser.id,
                    friend_id: person.id
                });
                
                if (fError) {
                    alert("Этот пользователь уже есть в вашем списке!");
                } else {
                    alert("Готово! Друг добавлен.");
                    document.getElementById('friend-id-input').value = "";
                    loadFriends();
                }
            }
        }

        // Загрузка списка друзей с их именами и аватарками
        async function loadFriends() {
            const listDiv = document.getElementById('friends-list');
            const { data, error } = await clientSB
                .from('friends')
                .select('profiles!friends_friend_id_fkey(full_name, avatar_url, short_id)')
                .eq('user_id', currentUser.id);

            if (data && data.length > 0) {
                listDiv.innerHTML = data.map(f => `
                    <div class="flex items-center gap-4 bg-white/5 p-4 rounded-[1.2rem] border border-white/5 shadow-lg">
                        <img src="${f.profiles.avatar_url}" class="w-12 h-12 rounded-full border border-blue-500/50 shadow-md">
                        <div class="flex-1">
                            <div class="text-sm font-black text-white">${f.profiles.full_name}</div>
                            <div class="text-[9px] text-gray-500 font-mono tracking-tighter uppercase italic">${f.profiles.short_id}</div>
                        </div>
                        <div class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e]"></div>
                    </div>
                `).join('');
            } else {
                listDiv.innerHTML = '<div class="text-center text-gray-600 text-xs mt-10 italic">У вас пока нет друзей</div>';
            }
        }

        async function deleteMyData() {
            if(confirm("Вы уверены? Это удалит всю историю ваших сообщений безвозвратно!")) {
                await clientSB.from('messagesmessages').delete().eq('author', currentUser.email);
                alert("История очищена!");
                loadMessages();
            }
        }

        function switchTab(tab) {
            ['chat', 'friends', 'settings'].forEach(t => {
                document.getElementById('section-' + t).classList.add('hidden');
                document.getElementById('tab-' + t).classList.remove('active');
            });
            document.getElementById('section-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('active');
            if (tab === 'friends') loadFriends();
        }

        clientSB.auth.onAuthStateChange((ev, session) => {
            if (session) {
                currentUser = session.user;
                document.getElementById('auth-ui').classList.add('hidden');
                document.getElementById('main-ui').classList.remove('hidden');
                syncProfile(currentUser);
                loadMessages();
                clientSB.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messagesmessages' }, () => loadMessages()).subscribe();
            } else {
                document.getElementById('auth-ui').classList.remove('hidden');
                document.getElementById('main-ui').classList.add('hidden');
            }
        });

        async function loadMessages() {
            const { data } = await clientSB.from('messagesmessages').select('*').order('created_at', { ascending: true });
            if (!data) return;
            const box = document.getElementById('box');
            box.innerHTML = data.map(m => `
                <div class="${m.author === currentUser.email ? 'msg-own' : 'msg-other'} px-5 py-3 max-w-[85%] shadow-2xl transition-all">
                    <div class="text-[8px] opacity-40 font-black mb-1 uppercase tracking-tighter">${m.author_name || 'Аноним'}</div>
                    <div class="text-[13px] leading-tight text-white/90 font-medium">${m.text}</div>
                </div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        async function send() {
            const i = document.getElementById('msg');
            if (!i.value.trim()) return;
            await clientSB.from('messagesmessages').insert([{ 
                text: i.value, 
                author: currentUser.email, 
                author_name: currentUser.user_metadata.full_name 
            }]);
            i.value = '';
        }

        function setTheme(t) { document.body.className = t === 'dark' ? '' : 'theme-' + t; localStorage.setItem('theme', t); }
        setTheme(localStorage.getItem('theme') || 'dark');
        document.getElementById('msg').onkeypress = e => { if (e.key === 'Enter') send(); };
    </script>
</body>
</html>
