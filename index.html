<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X3 MESSENGER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 2rem; border-radius: 2.5rem; width: 95%; max-width: 450px; text-align: center; }
        .hidden { display: none !important; }
        .msg-own { align-self: flex-end; background: #2563eb; border-radius: 15px 15px 0 15px; padding: 10px 15px; margin-bottom: 8px; max-width: 80%; text-align: left; }
        .msg-other { align-self: flex-start; background: #1e293b; border-radius: 15px 15px 15px 0; padding: 10px 15px; margin-bottom: 8px; max-width: 80%; text-align: left; }
    </style>
</head>
<body>

    <div id="auth-section" class="glass">
        <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center text-4xl font-black italic mx-auto mb-6">X3</div>
        <h1 class="text-3xl font-black mb-2 italic">X3 MESSENGER</h1>
        <button id="login-btn" class="w-full bg-white text-black py-4 rounded-2xl font-black flex items-center justify-center gap-3 hover:bg-gray-200 transition">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> ВОЙТИ ЧЕРЕЗ GOOGLE
        </button>
    </div>

    <div id="chat-section" class="hidden glass" style="max-width: 800px; height: 90vh; display: flex; flex-direction: column;">
        <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-4 text-xs">
            <span id="u-email" class="text-blue-400 font-bold">...</span>
            <button onclick="clientSB.auth.signOut()" class="text-red-500 font-bold uppercase">Выйти</button>
        </div>
        <div id="box" class="flex-1 overflow-y-auto mb-4 pr-2 flex flex-col"></div>
        <div class="flex gap-2">
            <input type="text" id="msg" placeholder="Текст..." class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white">
            <button id="send-btn" class="bg-blue-600 px-6 rounded-2xl font-bold hover:bg-blue-500 transition">-></button>
        </div>
    </div>

    <script>
        // Инициализация с НОВЫМ именем переменной, чтобы не было конфликтов
        const clientSB = supabase.createClient("https://diijudzypthmfdlhhglr.supabase.co", "sb_publishable_cxF0MUM3Gn7Lc_Bi1PIAag_bwyhwANF");

        const authS = document.getElementById('auth-section');
        const chatS = document.getElementById('chat-section');
        const chatB = document.getElementById('box');
        let myEmail = null;

        // Вход
        document.getElementById('login-btn').onclick = async () => {
            await clientSB.auth.signInWithOAuth({
                provider: 'google', options: { redirectTo: window.location.origin + window.location.pathname }
            });
        };

        // Слежка
        clientSB.auth.onAuthStateChange((event, session) => {
            if (session) {
                myEmail = session.user.email;
                authS.classList.add('hidden');
                chatS.classList.remove('hidden');
                document.getElementById('u-email').innerText = myEmail;
                load();
                clientSB.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messagesmessages' }, () => load()).subscribe();
            } else {
                authS.classList.remove('hidden');
                chatS.classList.add('hidden');
            }
        });

        async function load() {
            const { data } = await clientSB.from('messagesmessages').select('*').order('created_at', { ascending: true });
            if (!data) return;
            chatB.innerHTML = data.map(m => {
                const isMe = m.author === myEmail;
                return `<div class="${isMe ? 'msg-own' : 'msg-other'}">
                    <div class="text-[8px] opacity-40 font-bold mb-1">${m.author ? m.author.split('@')[0] : 'Аноним'}</div>
                    <div class="text-sm">${m.text}</div>
                </div>`;
            }).join('');
            chatB.scrollTop = chatB.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('msg');
            if (!input.value.trim()) return;
            await clientSB.from('messagesmessages').insert([{ text: input.value, author: myEmail }]);
            input.value = '';
        }

        document.getElementById('send-btn').onclick = send;
        document.getElementById('msg').onkeypress = e => { if (e.key === 'Enter') send(); };
    </script>
</body>
</html>
