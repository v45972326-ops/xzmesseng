<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X3 MESSENGER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 2.5rem; border-radius: 2.5rem; width: 90%; max-width: 400px; text-align: center; }
        .hidden { display: none !important; }
        .msg-own { align-self: flex-end; background: #2563eb; border-radius: 15px 15px 0 15px; padding: 10px 15px; margin-bottom: 10px; max-width: 85%; }
        .msg-other { align-self: flex-start; background: #1e293b; border-radius: 15px 15px 15px 0; padding: 10px 15px; margin-bottom: 10px; max-width: 85%; }
    </style>
</head>
<body>

    <div id="auth-section" class="glass">
        <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center text-4xl font-black italic mx-auto mb-6 shadow-xl">X3</div>
        <h1 class="text-3xl font-black mb-2 italic">X3 MESSENGER</h1>
        <p class="text-[10px] text-gray-500 mb-10 uppercase tracking-widest font-bold">Secure Google Login</p>
        <button onclick="login()" class="w-full bg-white text-black py-4 rounded-2xl font-black flex items-center justify-center gap-3 hover:bg-gray-200 transition">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> ВОЙТИ ЧЕРЕЗ GOOGLE
        </button>
    </div>

    <div id="chat-section" class="hidden glass shadow-2xl" style="max-width: 800px; height: 85vh; display: flex; flex-direction: column;">
        <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-4">
            <span id="u-name" class="text-xs font-bold text-blue-400">...</span>
            <button onclick="supabase.auth.signOut()" class="text-[9px] text-red-500 font-black uppercase">Выйти</button>
        </div>
        <div id="box" class="flex-1 overflow-y-auto mb-4 flex flex-col text-left text-sm"></div>
        <div class="flex gap-2">
            <input type="text" id="msg" placeholder="Сообщение..." class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white focus:ring-1 focus:ring-blue-500">
            <button onclick="send()" class="bg-blue-600 px-6 rounded-2xl font-bold hover:bg-blue-500 transition">-></button>
        </div>
    </div>

    <script>
        const SB_URL = "https://diijudzypthmfdlhhglr.supabase.co";
        const SB_KEY = "sb_publishable_cxF0MUM3Gn7Lc_Bi1PIAag_bwyhwANF";
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        async function login() {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google', options: { redirectTo: window.location.href }
            });
            if (error) alert(error.message);
        }

        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('chat-section').classList.remove('hidden');
                document.getElementById('u-name').innerText = session.user.email;
                loadMessages();
                supabase.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messagesmessages' }, () => loadMessages()).subscribe();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('chat-section').classList.add('hidden');
            }
        });

        async function loadMessages() {
            const { data } = await supabase.from('messagesmessages').select('*').order('created_at', { ascending: true });
            const box = document.getElementById('box');
            if (data) {
                box.innerHTML = data.map(m => {
                    const isMine = m.author === document.getElementById('u-name').innerText;
                    return `<div class="${isMine ? 'msg-own' : 'msg-other'}"><div class="text-[8px] opacity-40 font-bold mb-1">${m.author.split('@')[0]}</div><div>${m.text}</div></div>`;
                }).join('');
                box.scrollTop = box.scrollHeight;
            }
        }

        async function send() {
            const i = document.getElementById('msg');
            if (!i.value.trim()) return;
            const { data: { user } } = await supabase.auth.getUser();
            await supabase.from('messagesmessages').insert([{ text: i.value, author: user.email }]);
            i.value = '';
        }

        document.getElementById('msg').onkeypress = e => { if (e.key === 'Enter') send(); };
    </script>
</body>
</html>
