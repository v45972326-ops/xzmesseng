<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X3 Messenger Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #020617; --card: rgba(255,255,255,0.03); --primary: #2563eb; }
        .theme-midnight { --bg: #000000; --primary: #1e1e1e; }
        .theme-neon { --bg: #0f172a; --primary: #f472b6; }
        body { background: var(--bg); color: white; font-family: sans-serif; height: 100vh; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        .msg-own { align-self: flex-end; background: var(--primary); border-radius: 15px 15px 0 15px; padding: 10px 15px; }
        .msg-other { align-self: flex-start; background: rgba(255,255,255,0.1); border-radius: 15px 15px 15px 0; padding: 10px 15px; }
        .nav-btn { opacity: 0.4; cursor: pointer; padding: 12px; transition: 0.3s; }
        .nav-btn.active { opacity: 1; color: var(--primary); background: rgba(255,255,255,0.05); border-radius: 15px; }
        #main-ui { width: 100%; max-width: 1000px; height: 95vh; display: grid; grid-template-columns: 70px 1fr; }
        .chat-sidebar { width: 280px; border-right: 1px solid rgba(255,255,255,0.05); overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.02); cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .chat-item.active { background: rgba(37, 99, 235, 0.1); border-left: 4px solid var(--primary); }
        video { background: black; border-radius: 15px; width: 100%; max-width: 300px; }
        .rec-pulse { animation: pulse 1s infinite; color: #ef4444; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <!-- ВХОД -->
    <div id="auth-ui" class="glass p-10 rounded-[2.5rem] text-center w-full max-w-sm mx-4 shadow-2xl">
        <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-3xl font-black mx-auto mb-6 italic">X3</div>
        <button onclick="login()" class="w-full bg-white text-black py-4 rounded-2xl font-bold flex items-center justify-center gap-3 shadow-xl">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Войти через Google
        </button>
    </div>

    <!-- ИНТЕРФЕЙС -->
    <div id="main-ui" class="hidden glass sm:rounded-[2.5rem] overflow-hidden shadow-2xl">
        
        <!-- SIDEBAR -->
        <div class="bg-black/30 flex flex-col items-center py-6 border-r border-white/5">
            <img id="my-avatar" class="w-10 h-10 rounded-full mb-8 border-2 border-blue-500 shadow-lg cursor-pointer" onclick="switchTab('settings')" src="">
            <div class="flex flex-col gap-4 flex-1 text-xl">
                <i onclick="switchTab('chat')" id="tab-chat" class="fa-solid fa-comment-dots nav-btn active"></i>
                <i onclick="switchTab('friends')" id="tab-friends" class="fa-solid fa-user-plus nav-btn"></i>
                <i onclick="switchTab('settings')" id="tab-settings" class="fa-solid fa-gear nav-btn"></i>
            </div>
        </div>

        <div class="flex flex-1 overflow-hidden">
            <!-- СПИСОК ЧАТОВ -->
            <div id="chat-sidebar-ui" class="chat-sidebar bg-black/10">
                <div class="p-5 text-[10px] font-black uppercase text-gray-500 tracking-widest">Диалоги</div>
                <div onclick="openChat(null, 'Избранное')" id="chat-fav" class="chat-item active">
                    <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center"><i class="fa-solid fa-bookmark"></i></div>
                    <div class="text-sm font-bold">Избранное</div>
                </div>
                <div id="active-chats"></div>
            </div>

            <!-- ОКНО ЧАТА -->
            <div id="chat-window-ui" class="flex-1 flex flex-col overflow-hidden bg-black/5">
                <header class="p-4 border-b border-white/5 bg-white/5 flex justify-between items-center">
                    <span id="chat-title" class="font-bold text-blue-400">Избранное</span>
                    <div id="chat-actions" class="hidden flex gap-4 text-gray-400">
                        <i onclick="startCall(false)" class="fa-solid fa-phone hover:text-green-500 cursor-pointer"></i>
                        <i onclick="startCall(true)" class="fa-solid fa-video hover:text-blue-500 cursor-pointer"></i>
                        <i onclick="blockUser()" class="fa-solid fa-ban hover:text-red-500 cursor-pointer"></i>
                    </div>
                </header>
                
                <!-- Видеозвонок -->
                <div id="video-container" class="hidden p-4 bg-black flex flex-col items-center gap-2">
                    <video id="remote-video" autoplay></video>
                    <video id="local-video" autoplay muted class="w-32 absolute top-20 right-10 border-2 border-white"></video>
                    <button onclick="endCall()" class="bg-red-600 px-6 py-2 rounded-full font-bold">Завершить</button>
                </div>

                <div id="box" class="flex-1 overflow-y-auto p-5 space-y-4 flex flex-col"></div>
                
                <div class="p-4 border-t border-white/5 flex items-center gap-3">
                    <label class="cursor-pointer text-gray-400 hover:text-white"><i class="fa-solid fa-paperclip text-xl"></i><input type="file" id="fileInput" class="hidden" onchange="sendFile()"></label>
                    <button id="micBtn" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-microphone text-xl" id="micIcon"></i></button>
                    <input type="text" id="msg" placeholder="Написать..." class="flex-1 bg-white/5 border-none p-3 rounded-xl outline-none text-sm">
                    <button onclick="send()" class="bg-blue-600 px-6 py-3 rounded-xl hover:bg-blue-500 transition"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>

            <!-- НАСТРОЙКИ (ПРОФИЛЬ) -->
            <div id="section-settings" class="hidden flex-1 p-10 overflow-y-auto">
                <h2 class="text-2xl font-black mb-8 italic text-blue-400 uppercase">Профиль</h2>
                <div class="flex flex-col items-center gap-4 mb-10">
                    <div class="relative group">
                        <img id="set-avatar" class="w-24 h-24 rounded-3xl border-4 border-blue-500 shadow-2xl object-cover" src="">
                        <label class="absolute inset-0 flex items-center justify-center bg-black/50 opacity-0 group-hover:opacity-100 cursor-pointer rounded-3xl transition">
                            <i class="fa-solid fa-camera text-2xl"></i>
                            <input type="file" class="hidden" onchange="updateAvatar(this)">
                        </label>
                    </div>
                    <input type="text" id="set-nick-input" class="bg-white/5 border border-white/10 p-2 rounded-xl text-center font-bold outline-none focus:border-blue-500" placeholder="Ваш ник">
                    <button onclick="updateProfileName()" class="text-xs bg-blue-600 px-4 py-1 rounded-full font-bold">Сохранить ник</button>
                    <div id="set-id" class="text-xs font-mono text-gray-500 uppercase mt-2">ID: ...</div>
                </div>
                <div class="text-[10px] text-gray-500 font-bold mb-4 uppercase text-center">Темы</div>
                <div class="flex justify-center gap-4">
                    <button onclick="setTheme('dark')" class="w-10 h-10 rounded-xl bg-slate-900 border border-white/10"></button>
                    <button onclick="setTheme('midnight')" class="w-10 h-10 rounded-xl bg-black border border-white/10"></button>
                    <button onclick="setTheme('neon')" class="w-10 h-10 rounded-xl bg-pink-500 border border-white/10"></button>
                </div>
            </div>

            <!-- ДРУЗЬЯ (БЕЗ ИЗМЕНЕНИЙ) -->
            <div id="section-friends" class="hidden flex-1 p-10 overflow-y-auto">
                <h2 class="text-xl font-bold mb-6 italic text-blue-400">Поиск</h2>
                <div class="flex gap-2 mb-10"><input type="text" id="friend-id-input" placeholder="X3-XXXX" class="flex-1 bg-white/5 border border-white/10 p-3 rounded-xl outline-none"><button onclick="addFriend()" class="bg-blue-600 px-6 rounded-xl font-bold">Найти</button></div>
                <div id="requests-list" class="mb-10 space-y-2"></div>
                <div id="friends-list" class="space-y-2"></div>
            </div>

        </div>
    </div>

    <script>
        const clientSB = supabase.createClient("https://diijudzypthmfdlhhglr.supabase.co", "sb_publishable_cxF0MUM3Gn7Lc_Bi1PIAag_bwyhwANF");
        const REDIRECT_URL = window.location.origin + window.location.pathname;
        let currentUser = null, myShortID = "", currentPartnerId = null, peer = null;
        let mediaRecorder, audioChunks = [];

        async function login() { await clientSB.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: REDIRECT_URL } }); }
        async function logout() { await clientSB.auth.signOut(); window.location.reload(); }

        // --- ПРОФИЛЬ ---
        async function syncProfile(user) {
            myShortID = "X3-" + user.id.slice(0, 4).toUpperCase();
            
            // Инициализация PeerJS для звонков
            peer = new Peer(user.id);
            peer.on('call', async (call) => {
                if(confirm("Входящий звонок! Ответить?")) {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    call.answer(stream);
                    handleCall(call);
                }
            });

            const { data: p } = await clientSB.from('profiles').select('*').eq('id', user.id).single();
            if(!p) {
                await clientSB.from('profiles').insert({ id: user.id, short_id: myShortID, full_name: user.user_metadata.full_name, avatar_url: user.user_metadata.avatar_url, peer_id: user.id });
            }

            document.getElementById('my-avatar').src = p?.avatar_url || user.user_metadata.avatar_url;
            document.getElementById('set-avatar').src = p?.avatar_url || user.user_metadata.avatar_url;
            document.getElementById('my-nickname').innerText = p?.full_name || user.user_metadata.full_name;
            document.getElementById('set-nick-input').value = p?.full_name || user.user_metadata.full_name;
            document.getElementById('set-id').innerText = "ID: " + myShortID;
            
            loadChatList(); loadMessages();
        }

        async function updateProfileName() {
            const newName = document.getElementById('set-nick-input').value;
            await clientSB.from('profiles').update({ full_name: newName }).eq('id', currentUser.id);
            alert("Ник изменен!"); window.location.reload();
        }

        async function updateAvatar(input) {
            const file = input.files[0];
            const name = currentUser.id + "_avatar_" + Date.now();
            const { data } = await clientSB.storage.from('uploads').upload(name, file);
            if(data) {
                const { data: url } = clientSB.storage.from('uploads').getPublicUrl(name);
                await clientSB.from('profiles').update({ avatar_url: url.publicUrl }).eq('id', currentUser.id);
                alert("Аватар обновлен!"); window.location.reload();
            }
        }

        // --- ЗВОНКИ ---
        async function startCall(video) {
            const stream = await navigator.mediaDevices.getUserMedia({ video: video, audio: true });
            document.getElementById('local-video').srcObject = stream;
            document.getElementById('video-container').classList.remove('hidden');
            const call = peer.call(currentPartnerId, stream);
            handleCall(call);
        }

        function handleCall(call) {
            call.on('stream', (remoteStream) => {
                document.getElementById('video-container').classList.remove('hidden');
                document.getElementById('remote-video').srcObject = remoteStream;
            });
        }
        function endCall() { window.location.reload(); }

        // --- ОТПРАВКА МЕДИА ---
        async function sendFile() {
            const file = document.getElementById('fileInput').files[0];
            const name = Date.now() + "_" + file.name;
            const { data } = await clientSB.storage.from('uploads').upload(name, file);
            if(data) {
                const { data: url } = clientSB.storage.from('uploads').getPublicUrl(name);
                let type = file.type.startsWith('image') ? 'image' : (file.type.startsWith('video') ? 'video' : 'file');
                await clientSB.from('messagesmessages').insert([{ text: url.publicUrl, sender_id: currentUser.id, receiver_id: currentPartnerId, author_name: currentUser.user_metadata.full_name, type: type }]);
            }
        }

        // --- ГОЛОСОВЫЕ ---
        document.getElementById('micBtn').onclick = async () => {
            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const name = "voice_" + Date.now() + ".webm";
                    await clientSB.storage.from('uploads').upload(name, blob);
                    const { data: url } = clientSB.storage.from('uploads').getPublicUrl(name);
                    await clientSB.from('messagesmessages').insert([{ text: url.publicUrl, sender_id: currentUser.id, receiver_id: currentPartnerId, author_name: currentUser.user_metadata.full_name, type: 'audio' }]);
                };
                mediaRecorder.start();
                document.getElementById('micIcon').classList.add('rec-pulse');
            } else {
                mediaRecorder.stop();
                document.getElementById('micIcon').classList.remove('rec-pulse');
            }
        };

        // --- БЛОКИРОВКА ---
        async function blockUser() {
            if(confirm("Заблокировать пользователя?")) {
                await clientSB.from('blocks').insert({ blocker_id: currentUser.id, blocked_id: currentPartnerId });
                alert("Пользователь заблокирован!");
                window.location.reload();
            }
        }

        // --- БАЗОВЫЕ ФУНКЦИИ ---
        function switchTab(tab) {
            ['chat-sidebar-ui', 'chat-window-ui', 'section-friends', 'section-settings'].forEach(id => document.getElementById(id).classList.add('hidden'));
            if(tab === 'chat') { document.getElementById('chat-sidebar-ui').classList.remove('hidden'); document.getElementById('chat-window-ui').classList.remove('hidden'); }
            else document.getElementById('section-' + tab).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            if(tab === 'friends') loadFriendsData();
        }

        function openChat(id, name) {
            currentPartnerId = id;
            document.getElementById('chat-title').innerText = name;
            document.getElementById('chat-actions').classList.toggle('hidden', !id);
            document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
            loadMessages();
        }

        async function loadMessages() {
            let query = clientSB.from('messagesmessages').select('*');
            if(!currentPartnerId) query = query.eq('sender_id', currentUser.id).is('receiver_id', null);
            else query = query.or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${currentPartnerId}),and(sender_id.eq.${currentPartnerId},receiver_id.eq.${currentUser.id})`);
            
            const { data } = await query.order('created_at', { ascending: true });
            document.getElementById('box').innerHTML = (data || []).map(m => {
                let html = m.text;
                if(m.type === 'image') html = `<img src="${m.text}" class="rounded-xl max-h-60" onclick="window.open('${m.text}')">`;
                if(m.type === 'video') html = `<video src="${m.text}" controls class="rounded-xl"></video>`;
                if(m.type === 'audio') html = `<audio src="${m.text}" controls class="h-8"></audio>`;
                if(m.type === 'file') html = `<a href="${m.text}" target="_blank" class="underline text-blue-400 font-bold">Файл</a>`;

                return `<div class="${m.sender_id === currentUser.id ? 'msg-own' : 'msg-other'}"><div class="text-[13px]">${html}</div></div>`;
            }).join('');
            document.getElementById('box').scrollTop = 99999;
        }

        async function send() {
            const i = document.getElementById('msg'); if(!i.value.trim()) return;
            await clientSB.from('messagesmessages').insert([{ text: i.value, sender_id: currentUser.id, receiver_id: currentPartnerId, author_name: currentUser.user_metadata.full_name, type: 'text' }]);
            i.value = ''; loadMessages();
        }

        async function loadChatList() {
            const { data: f1 } = await clientSB.from('friends').select('profiles:receiver_id(*)').eq('sender_id', currentUser.id).eq('status', 'accepted');
            const { data: f2 } = await clientSB.from('friends').select('profiles:sender_id(*)').eq('receiver_id', currentUser.id).eq('status', 'accepted');
            const all = [...(f1 || []).map(x => x.profiles), ...(f2 || []).map(x => x.profiles)];
            document.getElementById('active-chats').innerHTML = all.map(f => `<div onclick="openChat('${f.id}', '${f.full_name}')" class="chat-item"><img src="${f.avatar_url}" class="w-10 h-10 rounded-xl"><div class="text-sm font-bold text-white">${f.full_name}</div></div>`).join('');
        }

        async function addFriend() {
            const val = document.getElementById('friend-id-input').value.trim().toUpperCase();
            const { data: p } = await clientSB.from('profiles').select('id').eq('short_id', val).single();
            if(!p) return alert("Пользователь не найден");
            await clientSB.from('friends').insert({ sender_id: currentUser.id, receiver_id: p.id });
            alert("Заявка отправлена!"); loadFriendsData();
        }

        async function acceptFriend(id) { await clientSB.from('friends').update({ status: 'accepted' }).eq('id', id); loadFriendsData(); loadChatList(); }

        async function loadFriendsData() {
            const { data: req } = await clientSB.from('friends').select('id, profiles:sender_id(*)').eq('receiver_id', currentUser.id).eq('status', 'pending');
            document.getElementById('requests-list').innerHTML = (req || []).map(r => `<div class="flex justify-between items-center glass p-3 rounded-xl border border-white/10"><span class="font-bold">${r.profiles.full_name}</span><button onclick="acceptFriend(${r.id})" class="bg-green-600 px-4 py-1 rounded text-xs">ПРИНЯТЬ</button></div>`).join('') || 'Нет заявок';
            const { data: fr } = await clientSB.from('friends').select('status, profiles:receiver_id(*)').eq('sender_id', currentUser.id);
            document.getElementById('friends-list').innerHTML = (fr || []).map(f => `<div class="flex items-center gap-4 glass p-3 rounded-xl"><img src="${f.profiles.avatar_url}" class="w-8 h-8 rounded-full"><div class="text-sm font-bold">${f.profiles.full_name} (${f.status})</div></div>`).join('') || 'Список пуст';
        }

        clientSB.auth.onAuthStateChange((ev, session) => {
            if (session) {
                currentUser = session.user;
                document.getElementById('auth-ui').classList.add('hidden');
                document.getElementById('main-ui').classList.remove('hidden');
                syncProfile(currentUser);
                clientSB.channel('gl').on('postgres_changes', { event: '*', schema: 'public', table: 'messagesmessages' }, () => loadMessages())
                .on('postgres_changes', { event: '*', schema: 'public', table: 'friends' }, () => { loadFriendsData(); loadChatList(); }).subscribe();
            }
        });

        function setTheme(t) { document.body.className = t === 'dark' ? '' : 'theme-' + t; localStorage.setItem('th_x3', t); }
        setTheme(localStorage.getItem('th_x3') || 'dark');
        document.getElementById('msg').onkeypress = e => { if (e.key === 'Enter') send(); };
    </script>
</body>
</html>
